<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>过程控制 PID 温度仿真系统</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>过程控制 PID 温度仿真系统</h1>
    <p>一阶惯性带纯滞后对象 + PID 控制器 + 扰动测试 + 性能指标分析</p>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>参数设置</h2>

      <div class="group">
        <h3>设定值与仿真参数</h3>
        <label>设定温度 r / ℃ <input id="setpoint" type="number" value="80" step="1"></label>
        <label>仿真时间 / s <input id="simTime" type="number" value="120" step="1"></label>
        <label>采样周期 Δt / s <input id="dt" type="number" value="0.1" step="0.01"></label>
      </div>

      <div class="group">
        <h3>PID 参数</h3>
        <label>Kp <input id="kp" type="number" value="2.0" step="0.1"></label>
        <label>Ki <input id="ki" type="number" value="0.05" step="0.01"></label>
        <label>Kd <input id="kd" type="number" value="0.8" step="0.1"></label>
        <div class="preset-row">
          <button data-preset="conservative">保守控制</button>
          <button data-preset="stable">稳定控制</button>
          <button data-preset="fast">快速控制</button>
        </div>
      </div>

      <div class="group">
        <h3>被控对象参数</h3>
        <label>对象增益 K <input id="plantK" type="number" value="1.0" step="0.1"></label>
        <label>时间常数 T / s <input id="plantT" type="number" value="18" step="1"></label>
        <label>纯滞后 τ / s <input id="delay" type="number" value="3" step="0.1"></label>
        <label>控制量上限 <input id="uMax" type="number" value="100" step="1"></label>
        <label>控制量下限 <input id="uMin" type="number" value="0" step="1"></label>
      </div>

      <div class="group">
        <h3>扰动测试</h3>
        <label><input id="disturbEnable" type="checkbox" checked> 启用扰动</label>
        <label>扰动时刻 / s <input id="disturbTime" type="number" value="60" step="1"></label>
        <label>扰动幅值 / ℃ <input id="disturbValue" type="number" value="-8" step="1"></label>
      </div>

      <div class="actions">
        <button id="runBtn" class="primary">开始仿真</button>
        <button id="csvBtn">导出 CSV</button>
        <button id="resetBtn">恢复默认</button>
      </div>
    </section>

    <section class="content">
      <div class="cards">
        <div class="card"><span>超调量</span><strong id="overshoot">--</strong></div>
        <div class="card"><span>调节时间</span><strong id="settlingTime">--</strong></div>
        <div class="card"><span>稳态误差</span><strong id="steadyError">--</strong></div>
        <div class="card"><span>IAE</span><strong id="iae">--</strong></div>
        <div class="card"><span>ISE</span><strong id="ise">--</strong></div>
      </div>

      <section class="chart-box">
        <div class="chart-title">
          <h2>温度响应曲线</h2>
          <p>蓝色：设定值；橙色：系统输出</p>
        </div>
        <canvas id="responseChart" width="1000" height="420"></canvas>
      </section>

      <section class="chart-box">
        <div class="chart-title">
          <h2>控制量曲线</h2>
          <p>显示 PID 控制器输出 u(t)</p>
        </div>
        <canvas id="controlChart" width="1000" height="360"></canvas>
      </section>

      <section class="analysis">
        <h2>结果分析</h2>
        <p id="analysisText">点击“开始仿真”后生成分析结果。</p>
      </section>
    </section>
  </main>

  <footer>过程控制系统及仪表课程大作业 · PID Temperature Control Simulator</footer>

  <script src="js/pid.js"></script>
  <script src="js/plant.js"></script>
  <script src="js/metrics.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
